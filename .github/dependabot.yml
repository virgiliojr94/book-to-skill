version: 2
updates:
  # Keep GitHub Actions fresh (and enables pinning actions to SHAs later).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    # One PR per week with all action bumps grouped, instead of one PR per action.
    groups:
      github-actions:
        patterns: ["*"]
